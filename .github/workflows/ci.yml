name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  verify:
    name: Verify CoffeeDex
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Product truth tests
        run: npm run test:product-truth

      - name: Route contract tests
        run: npm run test:routes

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build
